name: Python Automation

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분마다
  workflow_dispatch:       # 테스트를 위해 수동 실행 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run script
        run: python script.py
